name: Deploy to Production Server

on:
  workflow_dispatch: # This enables the manual "Run workflow" button

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Navigate to the project directory (ensure you clone it here first on your server)
            # You can change /opt/31stFile_Erp to wherever your project is located
            cd /opt/31stFile_Erp || { echo "Project directory not found"; exit 1; }
            
            echo "Pulling latest code from GitHub..."
            git pull origin main
            
            echo "Building and restarting Docker containers..."
            # Note: Ensure you have your .env.production file already created on the server
            docker compose --env-file .env.production up --build -d
            
            echo "Deployment successful!"
